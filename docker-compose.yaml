# docker-compose.yml - Production
# Usage: docker-compose up --build

services:
  # ============================================
  # Web application (Puma)
  # ============================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "sh",
        "-c",
        "bundle install --jobs 1 && RAILS_ENV=production bundle exec rails assets:precompile && rails db:migrate && rails db:seed && exec ./bin/thrust bin/rails server -b '0.0.0.0' -p ${PORT:-3031}",
      ]
    ports:
      - "3031:3031"
    volumes:
      # Persist SQLite databases and assets
      - koal_storage:/app/storage
      - koal_public:/app/public
    environment:
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-}
      - RAILS_ENV=production
      - RAILS_SERVE_STATIC_FILES=true
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_MAX_THREADS=3
      - PORT=3031
      # Database (using SQLite, no env vars needed as it's file-based)
      # SMTP Configuration
      - SMTP_SERVER=${SMTP_SERVER:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - APPLICATION_HOST=${APPLICATION_HOST:-localhost:3031}
      - EMAIL_DEFAULT_FROM=${EMAIL_DEFAULT_FROM:-noreply@example.com}
      - EMAIL_REPORT_EXCEPTION_TO=${EMAIL_REPORT_EXCEPTION_TO:-noreply@example.com}
    restart: unless-stopped

  # ============================================
  # Background job worker (Solid Queue)
  # ============================================
  worker:
    depends_on:
      - web
    build:
      context: .
      dockerfile: Dockerfile
    command: ["bin/jobs"]
    volumes:
      - koal_storage:/app/storage
    environment:
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-}
      # Database (using SQLite, no env vars needed as it's file-based)
    restart: unless-stopped

# ============================================
# Named volumes for persistence
# ============================================
volumes:
  koal_storage:
    driver: local
  koal_public:
    driver: local
